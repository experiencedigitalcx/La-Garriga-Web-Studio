<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Àrea Privada - Inici de Sessió</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: black;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 320px;
            text-align: center;
        }

        .login-container h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            font-size: 14px;
            color: #555;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        .input-group input:focus {
            outline: none;
            border-color: #a855f7;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #c6005c;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-btn:hover {
            background: #7c0241;
        }

        .footer-text {
            margin-top: 15px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Àrea Privada</h2>

        <form onsubmit="login(event)">
            <div class="input-group">
                <label for="username">Usuari</label>
                <input type="text" id="user" name="username" required>
            </div>

            <div class="input-group">
                <label for="password">Contrasenya</label>
                <input type="password" id="pass" name="password" required>
            </div>

            <button type="submit" class="login-btn">Iniciar sessió</button>
        </form>

        <div class="footer-text">
            Accés restringit només per usuaris autoritzats
        </div>
        <div ><br>

            <a style="font-size: 12px;;" href="index.html">Pàgina principal</a>
            <br><br>
            <div style="background-color: black; padding: 15px;">
 <img width="100px;" src="assets/logo_la_Garriga.png">
            </div>
           
        </div>
    </div>


</body>

</html>

<script type="module">
  // Firebase bàsic
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";

  // 🔐 IMPORT AUTH (això et faltava)
  import { 
    getAuth, 
    signInWithEmailAndPassword 
  } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "XXX",
    authDomain: "la-garriga-we-studio.firebaseapp.com",
    projectId: "la-garriga-we-studio",
    storageBucket: "la-garriga-we-studio.firebasestorage.app",
    messagingSenderId: "424908264933",
    appId: "1:424908264933:web:0ecb4a40906a1bdce28b0c",
    measurementId: "G-5BHV7BY0RX"
  };

  // Init
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);

  // 🔐 INIT AUTH
  const auth = getAuth(app);

  // 🔥 LOGIN (IMPORTANT: global)
  window.login = function(e) {
    e.preventDefault();

    const email = document.getElementById("user").value;
    const password = document.getElementById("pass").value;

    signInWithEmailAndPassword(auth, email, password)
      .then((userCredential) => {
        window.location.href = "areaprivada_success.html";
      })
      .catch((error) => {
        alert("Accés denegat!    " + error.message);
      });
  }
</script>
